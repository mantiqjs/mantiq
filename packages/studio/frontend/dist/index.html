<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio</title>
  <script type="module" crossorigin src="/assets/index-DEuFbWur.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DCP-w4dQ.css">
</head>
<body>
  <div id="root"></div>
  <script>
    // Apply dark mode before React loads to prevent flash
    (function() {
      var t = localStorage.getItem('mantiq-studio-theme');
      var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>
</body>
</html>
