name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: mantiq_test
          POSTGRES_DB: mantiq_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mantiq_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mantiq_test
          MYSQL_USER: mantiq_test
          MYSQL_PASSWORD: mantiq_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong@Passw0rd
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025

      meilisearch:
        image: getmeili/meilisearch:latest
        env:
          MEILI_MASTER_KEY: testkey
          MEILI_NO_ANALYTICS: true
        ports:
          - 7700:7700
        options: >-
          --health-cmd "curl -sf http://localhost:7700/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      elasticsearch:
        image: elasticsearch:8.17.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms256m -Xmx256m"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start Typesense
        run: |
          mkdir -p /tmp/typesense-data
          docker run -d --name typesense \
            -p 8108:8108 \
            -v /tmp/typesense-data:/data \
            -e TYPESENSE_API_KEY=testkey \
            -e TYPESENSE_DATA_DIR=/data \
            typesense/typesense:26.0
          # Wait for it to be ready
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8108/health && break || sleep 2
          done

      - name: Create MSSQL test database
        run: |
          for tool in /opt/mssql-tools18/bin/sqlcmd /opt/mssql-tools/bin/sqlcmd; do
            if command -v $tool &>/dev/null || [ -f "$tool" ]; then
              $tool -S 127.0.0.1 -U sa -P 'YourStrong@Passw0rd' -C -Q "IF DB_ID('mantiq_test') IS NULL CREATE DATABASE mantiq_test" 2>/dev/null && break
            fi
          done
          # Fallback: try with docker exec
          docker exec $(docker ps -q --filter ancestor=mcr.microsoft.com/mssql/server:2022-latest) /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -Q "IF DB_ID('mantiq_test') IS NULL CREATE DATABASE mantiq_test" 2>/dev/null || true

      - name: Run tests
        env:
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_USER: mantiq_test
          PG_DB: mantiq_test
          DB_HOST: 127.0.0.1
          DB_USER: mantiq_test
          DB_PASSWORD: mantiq_test
          MSSQL_HOST: 127.0.0.1
          MSSQL_PORT: 1433
          MSSQL_DB: mantiq_test
          MSSQL_USER: sa
          MSSQL_PASSWORD: YourStrong@Passw0rd
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          SMTP_HOST: 127.0.0.1
          SMTP_PORT: 1025
          MAILPIT_API: http://127.0.0.1:8025
          MEILI_HOST: http://127.0.0.1:7700
          MEILI_KEY: testkey
          TYPESENSE_HOST: 127.0.0.1
          TYPESENSE_PORT: 8108
          TYPESENSE_KEY: testkey
          ES_HOST: http://127.0.0.1:9200
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          SKIP_OLLAMA: "1"
        run: bun run test:ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck all packages
        run: bun run typecheck

  ai-test:
    name: AI Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-tinyllama-allminilm-v1

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/api/tags && break || sleep 2
          done

      - name: Pull models
        run: |
          ollama pull tinyllama
          ollama pull all-minilm

      - name: Run AI unit tests
        run: bun test packages/ai/tests/unit/

      - name: Run AI integration tests
        env:
          OLLAMA_HOST: http://127.0.0.1
          OLLAMA_PORT: 11434
          OLLAMA_CHAT_MODEL: tinyllama
          OLLAMA_EMBED_MODEL: all-minilm
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bun test packages/ai/tests/integration/

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

  scaffold:
    name: Starter Kit Sanity
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kit: [none, react, vue, svelte]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install monorepo deps
        run: bun install --frozen-lockfile

      - name: Scaffold ${{ matrix.kit }} app
        run: |
          KIT_FLAG=""
          if [ "${{ matrix.kit }}" != "none" ]; then
            KIT_FLAG="--kit=${{ matrix.kit }}"
          fi
          cd /tmp
          bun ${{ github.workspace }}/packages/create-mantiq/src/index.ts test-app $KIT_FLAG --yes --no-git
          # Link local workspace packages instead of published npm versions
          cd test-app
          for pkg in core database auth cli validation helpers filesystem logging events queue realtime heartbeat vite mail notify search health oauth social-auth testing ai; do
            PKG_DIR="${{ github.workspace }}/packages/$pkg"
            if [ -d "$PKG_DIR" ]; then
              rm -rf "node_modules/@mantiq/$pkg"
              ln -s "$PKG_DIR" "node_modules/@mantiq/$pkg" 2>/dev/null || true
            fi
          done

      - name: Run migrations
        run: |
          cd /tmp/test-app
          bun mantiq migrate

      - name: Verify APP_KEY exists (or generate)
        run: |
          cd /tmp/test-app
          if grep -q "APP_KEY=base64:" .env; then
            echo "  ✓ APP_KEY already set by scaffolder"
          else
            bun mantiq key:generate
            echo "  ✓ APP_KEY generated"
          fi
          grep "APP_KEY=base64:" .env

      - name: Generate schema interfaces
        run: |
          cd /tmp/test-app
          bun mantiq schema:generate
          cat app/Models/schemas.d.ts

      - name: Boot server and smoke test
        run: |
          cd /tmp/test-app
          APP_PORT=3000 APP_DEBUG=true bun run index.ts &
          SERVER_PID=$!
          sleep 5

          echo "── ${{ matrix.kit }} smoke checks ──"

          # Basic health
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          echo "  GET / → HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || exit 1

          PING_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/ping)
          echo "  GET /api/ping → HTTP $PING_CODE"
          [ "$PING_CODE" = "200" ] || exit 1

          # API-only: quick token auth test
          if [ "${{ matrix.kit }}" = "none" ]; then
            REG=$(curl -s -o /tmp/reg.json -w "%{http_code}" -X POST http://localhost:3000/api/register \
              -H "Content-Type: application/json" \
              -d '{"name":"CI","email":"ci@test.com","password":"secret123"}')
            echo "  POST /api/register → HTTP $REG"
            [ "$REG" = "201" ] || exit 1
          fi

          kill $SERVER_PID 2>/dev/null || true
          echo "  ✓ All smoke checks passed"

  e2e:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kit: [api-only, react, vue, svelte]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run ${{ matrix.kit }} e2e tests
        run: |
          # Kit-specific tests
          bunx playwright test e2e/${{ matrix.kit }}-kit.spec.ts 2>/dev/null || \
          bunx playwright test e2e/${{ matrix.kit }}.spec.ts 2>/dev/null || true

          # Shared tests (auth flow + CRUD) — run for all kits with frontend
          if [ "${{ matrix.kit }}" != "api-only" ]; then
            bunx playwright test e2e/auth-flow.spec.ts e2e/crud-ops.spec.ts
          else
            bunx playwright test e2e/token-auth.spec.ts e2e/api-only.spec.ts
          fi

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.kit }}-results
          path: |
            playwright-report/
            test-results/
