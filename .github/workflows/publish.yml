name: Publish

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to publish (comma-separated, or "all")'
        required: true
        default: all
      dry-run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun test packages/*/tests/unit/

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish packages
        run: |
          PACKAGES="${{ github.event.inputs.packages }}"
          DRY_RUN="${{ github.event.inputs.dry-run }}"
          VERSION=$(jq -r .version package.json)

          PUBLISHED=0
          SKIPPED=0
          FAILED=0

          publish_pkg() {
            local dir=$1
            local name=$(jq -r .name "$dir/package.json")
            local version=$(jq -r .version "$dir/package.json")
            local published=$(npm view "$name" version 2>/dev/null || echo "0.0.0")

            if [ "$version" = "$published" ]; then
              echo "⏭  $name@$version — already published"
              SKIPPED=$((SKIPPED+1))
              return
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "🔍  $name@$version — dry run (would publish)"
              PUBLISHED=$((PUBLISHED+1))
            else
              echo "📦  $name@$version — publishing..."
              if npm publish "$dir" --access public 2>&1; then
                echo "✓  $name@$version published"
                PUBLISHED=$((PUBLISHED+1))
              else
                echo "✗  $name@$version FAILED"
                FAILED=$((FAILED+1))
              fi
            fi
          }

          if [ "$PACKAGES" = "all" ]; then
            for dir in packages/*/; do
              private=$(jq -r '.private // false' "$dir/package.json")
              [ "$private" = "true" ] && continue
              publish_pkg "$dir"
            done
          else
            IFS=',' read -ra NAMES <<< "$PACKAGES"
            for name in "${NAMES[@]}"; do
              name=$(echo "$name" | xargs)
              if [ -d "packages/$name" ]; then
                publish_pkg "packages/$name"
              elif [ -d "packages/create-$name" ]; then
                publish_pkg "packages/create-$name"
              else
                echo "⚠  Package '$name' not found"
              fi
            done
          fi

          echo ""
          echo "═══════════════════════════════════"
          echo "  Version:   $VERSION"
          echo "  Published: $PUBLISHED"
          echo "  Skipped:   $SKIPPED"
          echo "  Failed:    $FAILED"
          echo "═══════════════════════════════════"

          if [ "$FAILED" -gt 0 ]; then exit 1; fi
