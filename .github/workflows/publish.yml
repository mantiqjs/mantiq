name: Publish

on:
  # Auto-publish on every push to master (auto-bumps version from commits)
  push:
    branches: [master]

  # Manual trigger for selective/dry-run publishes
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (auto reads commits, or force a specific bump)'
        type: choice
        options: [auto, patch, minor, major, skip]
        default: auto
      packages:
        description: 'Packages to publish (comma-separated, or "all")'
        required: true
        default: all
      dry-run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine version bump
        id: bump
        run: |
          CURRENT=$(jq -r .version package.json)
          PUBLISHED=$(npm view mantiqjs version 2>/dev/null || echo "0.0.0")
          BUMP_INPUT="${{ github.event.inputs.bump || 'auto' }}"

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT

          if [ "$BUMP_INPUT" = "skip" ]; then
            echo "type=skip" >> $GITHUB_OUTPUT
            echo "  Skipping version bump"
            exit 0
          fi

          if [ "$BUMP_INPUT" != "auto" ]; then
            echo "type=$BUMP_INPUT" >> $GITHUB_OUTPUT
            echo "  Forced bump: $BUMP_INPUT"
            exit 0
          fi

          # Auto-detect from commit messages since last publish tag
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD~20..HEAD"
          else
            RANGE="$LAST_TAG..HEAD"
          fi

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" 2>/dev/null || git log --oneline -20 --pretty=format:"%s")

          HAS_BREAKING=$(echo "$COMMITS" | grep -c '!:' || true)
          HAS_FEAT=$(echo "$COMMITS" | grep -c '^feat' || true)
          HAS_FIX=$(echo "$COMMITS" | grep -c '^fix\|^chore\|^style\|^refactor\|^perf\|^docs' || true)

          if [ "$HAS_BREAKING" -gt 0 ]; then
            echo "type=major" >> $GITHUB_OUTPUT
            echo "  Auto-detected: major (breaking changes)"
          elif [ "$HAS_FEAT" -gt 0 ]; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "  Auto-detected: minor (new features)"
          elif [ "$HAS_FIX" -gt 0 ]; then
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "  Auto-detected: patch (fixes/chores)"
          else
            echo "type=skip" >> $GITHUB_OUTPUT
            echo "  No conventional commits found â€” skipping"
          fi

      - name: Bump version
        if: steps.bump.outputs.type != 'skip'
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          TYPE="${{ steps.bump.outputs.type }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$TYPE" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "  $CURRENT â†’ $NEW ($TYPE)"

          # Update all package.json files
          bun run version:set "$NEW"

      - name: Commit version bump
        if: steps.bump.outputs.type != 'skip'
        run: |
          NEW="${{ steps.version.outputs.new }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release v$NEW" --allow-empty
          git tag "v$NEW"
          git push origin master --tags

      - name: Setup npm auth
        if: steps.bump.outputs.type != 'skip'
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish packages
        if: steps.bump.outputs.type != 'skip'
        run: |
          PACKAGES="${{ github.event.inputs.packages || 'all' }}"
          DRY_RUN="${{ github.event.inputs.dry-run || 'false' }}"
          VERSION="${{ steps.version.outputs.new }}"

          PUBLISHED=0
          SKIPPED=0
          FAILED=0

          publish_pkg() {
            local dir=$1
            local name=$(jq -r .name "$dir/package.json")
            local version=$(jq -r .version "$dir/package.json")
            local published=$(npm view "$name" version 2>/dev/null || echo "0.0.0")

            if [ "$version" = "$published" ]; then
              echo "  $name@$version â€” already published"
              SKIPPED=$((SKIPPED+1))
              return
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "  $name@$version â€” dry run (would publish)"
              PUBLISHED=$((PUBLISHED+1))
            else
              echo "  $name@$version â€” publishing..."
              if npm publish "$dir" --access public 2>&1; then
                echo "  $name@$version published"
                PUBLISHED=$((PUBLISHED+1))
              else
                echo "  $name@$version FAILED"
                FAILED=$((FAILED+1))
              fi
            fi
          }

          if [ "$PACKAGES" = "all" ]; then
            for dir in packages/*/; do
              private=$(jq -r '.private // false' "$dir/package.json")
              [ "$private" = "true" ] && continue
              publish_pkg "$dir"
            done
          else
            IFS=',' read -ra NAMES <<< "$PACKAGES"
            for name in "${NAMES[@]}"; do
              name=$(echo "$name" | xargs)
              if [ -d "packages/$name" ]; then
                publish_pkg "packages/$name"
              elif [ -d "packages/create-$name" ]; then
                publish_pkg "packages/create-$name"
              else
                echo "  Package '$name' not found"
              fi
            done
          fi

          echo ""
          echo "==================================="
          echo "  Version:   $VERSION"
          echo "  Published: $PUBLISHED"
          echo "  Skipped:   $SKIPPED"
          echo "  Failed:    $FAILED"
          echo "==================================="

          if [ "$FAILED" -gt 0 ]; then exit 1; fi
