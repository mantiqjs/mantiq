name: Publish

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to publish (comma-separated, or "all")'
        required: true
        default: all
      dry-run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test:ci

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish packages
        run: |
          PACKAGES="${{ github.event.inputs.packages }}"
          DRY_RUN="${{ github.event.inputs.dry-run }}"

          publish_pkg() {
            local dir=$1
            local name=$(jq -r .name "$dir/package.json")
            local version=$(jq -r .version "$dir/package.json")
            local published=$(npm view "$name" version 2>/dev/null || echo "0.0.0")

            if [ "$version" = "$published" ]; then
              echo "⏭  $name@$version — already published"
              return
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "🔍  $name@$version — dry run (would publish)"
              npm publish "$dir" --access public --dry-run
            else
              echo "📦  $name@$version — publishing..."
              npm publish "$dir" --access public
              echo "✓  $name@$version published"
            fi
          }

          if [ "$PACKAGES" = "all" ]; then
            for dir in packages/*/; do
              # Skip docs, skip private packages
              private=$(jq -r '.private // false' "$dir/package.json")
              [ "$private" = "true" ] && continue
              publish_pkg "$dir"
            done
          else
            IFS=',' read -ra NAMES <<< "$PACKAGES"
            for name in "${NAMES[@]}"; do
              name=$(echo "$name" | xargs)  # trim whitespace
              # Try packages/<name> or packages/create-<name>
              if [ -d "packages/$name" ]; then
                publish_pkg "packages/$name"
              elif [ -d "packages/create-$name" ]; then
                publish_pkg "packages/create-$name"
              else
                echo "⚠  Package '$name' not found"
              fi
            done
          fi
